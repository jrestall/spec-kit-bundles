schema_version: "1.0"

bundle:
  id: "multirepo-planning"
  name: "Multi-Repo Planning"
  version: "0.1.0"
  role: "platform"
  description: "Shared specs repos and per-spec worksets for Spec Kit multi-repo implementation."
  author: "local"
  license: "MIT"

requires:
  speckit_version: ">=0.9.0"
  tools: []
  mcp: []

provides:
  extensions:
    - id: "multirepo"
      version: "0.1.0"
  presets:
    - id: "multirepo-planning"
      version: "0.1.0"
      priority: 5
      strategy: "wrap"

tags:
  - "planning"
  - "multi-repo"
  - "workset"
