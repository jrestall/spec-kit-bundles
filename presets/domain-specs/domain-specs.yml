# Domain Specs Preset Configuration
#
# Domain taxonomy is metadata only. This preset no longer controls paths.
# Parent specs normally live at:
#   specs/<feature>
#
# Child specs created by /speckit-spec-decompose live at:
#   specs/<parent-feature>/specs/<child-feature>
#
# Domain selection is optional. The AI may infer one configured domain when it
# is clear, but must not block spec creation just to collect taxonomy.

numbering_scope: "feature"

allowed_domains:
  - id: "checkout"
    name: "Checkout"
    description: "Cart, payment, order placement, fulfillment handoff, and purchase completion flows."
  - id: "catalog"
    name: "Catalog"
    description: "Product discovery, product details, search, filtering, pricing display, and merchandising."
  - id: "identity"
    name: "Identity"
    description: "Authentication, authorization, account lifecycle, profile, sessions, and permissions."
