schema_version: "1.0"

preset:
  id: "domain-specs"
  name: "Domain Specs"
  version: "0.1.0"
  description: "Creates Spec Kit features under specs/<domain>/<feature> with explicit domain selection."
  author: "local"
  repository: "https://github.com/jrestall/spec-kit-bundles"
  license: "MIT"

requires:
  speckit_version: ">=0.9.0"

provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Domain-aware specify workflow"
      strategy: "wrap"

tags:
  - "domain"
  - "specs"
  - "workflow"
