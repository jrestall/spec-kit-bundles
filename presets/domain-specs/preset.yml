schema_version: "1.0"

preset:
  id: "domain-specs"
  name: "Domain Specs"
  version: "0.1.0"
  description: "Adds optional domain taxonomy guidance without constraining parent/child spec paths."
  author: "local"
  repository: "https://github.com/jrestall/spec-kit-bundles"
  license: "MIT"

requires:
  speckit_version: ">=0.9.0"

provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Taxonomy-aware specify workflow"
      strategy: "wrap"

tags:
  - "domain"
  - "taxonomy"
  - "specs"
  - "nested-specs"
