schema_version: "1.0"

preset:
  id: "multirepo-planning"
  name: "Multi-Repo Planning"
  version: "0.1.0"
  description: "Wraps Spec Kit commands with specs-repo and per-spec workset behavior."
  author: "local"
  repository: "https://github.com/jrestall/spec-kit-bundles"
  license: "MIT"

requires:
  speckit_version: ">=0.9.0"

provides:
  templates:
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Planning-aware constitution workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Planning-aware specify workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Planning-aware clarify workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Planning-aware checklist workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Planning-aware plan workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Planning-aware tasks workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Planning-aware analyze workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Planning-aware implement workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.converge"
      file: "commands/speckit.converge.md"
      description: "Planning-aware converge workflow"
      strategy: "wrap"
    - type: "command"
      name: "speckit.taskstoissues"
      file: "commands/speckit.taskstoissues.md"
      description: "Planning-aware tasks-to-issues workflow"
      strategy: "wrap"
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Adds specs-repo metadata to feature specs"
      strategy: "append"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Adds multi-repo implementation scope to plans"
      strategy: "append"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Adds repo-routed task conventions"
      strategy: "append"

tags:
  - "planning"
  - "multi-repo"
  - "workset"
